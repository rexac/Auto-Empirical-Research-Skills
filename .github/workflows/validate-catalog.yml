name: Validate catalog and repo structure

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate repository structure
        run: python3 scripts/validate-repo.py

      - name: Check generated catalog
        run: python3 scripts/build-catalog.py --check
